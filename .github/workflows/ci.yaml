name: CI

on:
  pull_request:
    branches:
      - main
      - release/**
  push:
    branches:
      - main
      - release/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  golangci:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: go.mod
        cache-dependency-path: go.sum
    - name: Go Mod Download
      run: go mod download
    - name: golangci-lint
      uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
      with:
        version: v2.12.2
        args: "--timeout 5m -v"

  check-license:
    name: Check License
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: go.mod
        cache-dependency-path: go.sum
    - name: Go Mod Download
      run: go mod download
    - name: Install addlicense
      run: go install github.com/google/addlicense@latest
    - name: Check license headers
      run: |
        addlicense -check -l mit -f ./LICENSE -c "FLYR, Inc" $(find . -type f -name "*.go")

  go-sec:
    name: GoSec
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: go.mod
        cache-dependency-path: go.sum
    - name: Go Mod Download
      run: go mod download
    - name: Run Gosec Security Scanner
      uses: securego/gosec@8d05295c5aed2220725cdfa56705df4106260d8a
      with:
        args: '-no-fail -fmt sarif -out gosec-results.sarif ./...'
    - name: Upload GoSec scan to GitHub Security
      uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
      with:
        sarif_file: gosec-results.sarif
    - name: Upload Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      id: upload-artifact
      with:
        name: sonar-reports-gosec
        path: gosec-results.sarif

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Run Trivy vulnerability scanner filesystem
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      with:
        scan-type: fs
        scan-ref: '.'
        hide-progress: false
        format: "sarif"
        output: "trivy-results-fs.sarif"
    - name: Upload Trivy scan to GitHub Security
      uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
      with:
        sarif_file: trivy-results-fs.sarif
    - name: Upload Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      id: upload-artifact
      with:
        name: sonar-reports-trivy-fs
        path: trivy-results-fs.sarif

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: go.mod
        cache-dependency-path: go.sum
    - name: Go Mod Download
      run: go mod download
    - name: Run Unit Tests
      continue-on-error: true
      env:
        SPANNER_EMULATOR_HOST: localhost:9010
        PUBSUB_EMULATOR_HOST: localhost:8681
      run: |
        go run gotest.tools/gotestsum@latest --junitfile report.xml --jsonfile test-results.json -- -coverprofile coverage.out ./...
    - name: Convert Unit Tests
      continue-on-error: true
      run: |
        go run github.com/ctrf-io/go-ctrf-json-reporter/cmd/go-ctrf-json-reporter@latest -output ctrf-report.json < test-results.json
    - name: Upload Test Results Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      id: upload-test-results
      with:
        name: sonar-reports-test-results
        path: |
          test-results.json
          report.xml
    - name: Upload Coverage Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      id: upload-coverage
      with:
        name: sonar-reports-coverage
        path: coverage.out
    - name: Publish Test Report
      uses: ctrf-io/github-test-reporter@e500b992f936420eb633c91644cf10d4d71df700 # v1
      with:
        report-path: ctrf-report.json
        group-by: suite
        summary-report: true
        failed-report: true
        flaky-report: true
        skipped-report: true
        suite-folded-report: true
        exit-on-fail: true

  sonar-cloud:
    name: Run SonarCloud Code Analysis
    runs-on: ubuntu-latest
    needs: [unit-tests, trivy, go-sec]
    if:  ${{ github.actor != 'dependabot[bot]' }} && (success() || failure())
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
    - name: Download Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        pattern: sonar-reports-*
        merge-multiple: true
        path: sonar-reports
    - name: Get Version
      id: version
      run: echo "version=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
    - name: Get Reports
      id: get-reports
      run: |
        SARIF_FILES=""
        for file in $(find sonar-reports -name '*.sarif'); do
          if [ -z "$SARIF_FILES" ]; then
            SARIF_FILES="$file"
          else
            SARIF_FILES="$SARIF_FILES,$file"
          fi
        done
        echo "sarif_files=$SARIF_FILES" >> "$GITHUB_OUTPUT"
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7.2.1
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.go.coverage.reportPaths=sonar-reports/coverage.out
          -Dsonar.go.tests.reportPaths=sonar-reports/unit-test-results.json
          -Dsonar.sarifReportPaths=${{ steps.get-reports.outputs.sarif_files }}
          -Dsonar.projectVersion=${{ steps.version.outputs.version }}
